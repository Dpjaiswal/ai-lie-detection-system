# model_config.yaml — AI-Powered Lie Detection System

# ─── NLP Models ───────────────────────────────────────────────
nlp:
  baseline:
    tfidf:
      max_features: 50000
      ngram_range: [1, 3]
      min_df: 2
      max_df: 0.95
      sublinear_tf: true
    logistic_regression:
      C: 1.0
      max_iter: 1000
      solver: lbfgs
      class_weight: balanced
    xgboost:
      n_estimators: 300
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      use_label_encoder: false
      eval_metric: logloss

  word2vec:
    vector_size: 300
    window: 5
    min_count: 1
    workers: 4
    epochs: 10

  transformer:
    bert:
      model_name: bert-base-uncased
      max_length: 512
      num_labels: 2
    roberta:
      model_name: roberta-base
      max_length: 512
      num_labels: 2
    deberta:
      model_name: microsoft/deberta-v3-base
      max_length: 512
      num_labels: 2

# ─── Audio Models ─────────────────────────────────────────────
audio:
  feature_extraction:
    sample_rate: 22050
    n_mfcc: 40
    n_chroma: 12
    n_mels: 128
    hop_length: 512
    win_length: 2048
    fmax: 8000

  classical:
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 5
      class_weight: balanced
    svm:
      kernel: rbf
      C: 10.0
      gamma: scale
      probability: true
    xgboost:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.05

  deep_learning:
    cnn:
      input_shape: [128, 128, 1]
      filters: [32, 64, 128, 256]
      kernel_size: [3, 3]
      pool_size: [2, 2]
      dropout: 0.3
      dense_units: [256, 128]
    lstm:
      input_size: 40
      hidden_size: 128
      num_layers: 2
      dropout: 0.3
      bidirectional: true
    cnn_lstm:
      cnn_channels: [64, 128]
      lstm_hidden: 128
      lstm_layers: 2
      dropout: 0.3

# ─── Fusion Models ────────────────────────────────────────────
fusion:
  early_fusion:
    hidden_dims: [512, 256, 128]
    dropout: 0.4
    activation: relu
  late_fusion:
    text_weight: 0.5
    audio_weight: 0.5
    method: weighted_average  # weighted_average | learned | stacking
  hybrid_fusion:
    attention_heads: 8
    attention_dim: 256
    hidden_dims: [256, 128]
    dropout: 0.3

# ─── Training Defaults ────────────────────────────────────────
training:
  batch_size: 32
  num_epochs: 10
  learning_rate: 2e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_accumulation_steps: 4
  fp16: true
  seed: 42
  early_stopping_patience: 5
  save_best_only: true
